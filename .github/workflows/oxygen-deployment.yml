name: Deploy to Oxygen

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  deployments: write
  pull-requests: write

jobs:
  deploy:
    name: Deploy to Shopify Oxygen
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: hydrogen/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: hydrogen

      - name: Build & deploy to Oxygen
        run: npx shopify hydrogen deploy --force
        working-directory: hydrogen
        env:
          SHOPIFY_HYDROGEN_DEPLOYMENT_TOKEN: ${{ secrets.SHOPIFY_HYDROGEN_DEPLOYMENT_TOKEN }}
          PUBLIC_STORE_DOMAIN: mls-uae.myshopify.com
          PUBLIC_STOREFRONT_API_TOKEN: ${{ secrets.PUBLIC_STOREFRONT_API_TOKEN }}
          PRIVATE_STOREFRONT_API_TOKEN: ${{ secrets.PRIVATE_STOREFRONT_API_TOKEN }}
          PUBLIC_STOREFRONT_API_VERSION: 2025-07
          PUBLIC_STOREFRONT_ID: 1000144872
          PUBLIC_CUSTOMER_ACCOUNT_CLIENT_ID: 0c2b2a74-89db-456a-ad3b-ebb485d083d6
          PUBLIC_CUSTOMER_ACCOUNT_API_URL: https://shopify.com/59406614597
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          PUBLIC_CHECKOUT_DOMAIN: mls-uae.myshopify.com
          PUBLIC_LIVE_STORE_DOMAIN: mlsuae.ae
          SHOPIFY_ADMIN_API_TOKEN: ${{ secrets.SHOPIFY_ADMIN_API_TOKEN }}
          JUDGEME_API_TOKEN: ${{ secrets.JUDGEME_API_TOKEN }}
